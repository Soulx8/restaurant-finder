<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>مطاعم | Mataam</title>
<link rel="manifest" href="data:application/json,{}">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #0a0a0a;
  --bg2: #141414;
  --bg3: #1e1e1e;
  --border: rgba(255,255,255,0.08);
  --accent: #FF6B35;
  --accent2: #FF8C5A;
  --text: #f0f0f0;
  --muted: #888;
  --green: #4ade80;
  --red: #f87171;
  --radius: 16px;
}

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* APP SHELL */
.app { display:flex; flex-direction:column; height:100vh; max-width:480px; margin:0 auto; position:relative; }

/* HEADER */
.header {
  padding: 16px 20px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top:0; z-index:100;
  backdrop-filter: blur(20px);
}

.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }

.logo { font-size:22px; font-weight:900; letter-spacing:-0.5px; }
.logo span { color: var(--accent); }

.location-pill {
  display:flex; align-items:center; gap:5px;
  background: var(--bg3); border:1px solid var(--border);
  padding: 6px 12px; border-radius:20px;
  font-size:12px; color:var(--muted); cursor:pointer;
  transition: all 0.2s;
}
.location-pill:hover { border-color: var(--accent); color:var(--text); }
.location-pill .dot { width:6px; height:6px; background:var(--green); border-radius:50%; }

/* SEARCH */
.search-wrap { position:relative; }
.search-input {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  border-radius:12px; padding:12px 16px 12px 44px;
  color:var(--text); font-family:'Tajawal',sans-serif; font-size:15px;
  outline:none; transition:all 0.2s;
}
.search-input:focus { border-color:var(--accent); }
.search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:18px; }

/* FILTERS */
.filters { display:flex; gap:8px; padding:12px 20px; overflow-x:auto; scrollbar-width:none; }
.filters::-webkit-scrollbar { display:none; }
.filter-btn {
  flex-shrink:0; background:var(--bg3); border:1px solid var(--border);
  border-radius:20px; padding:7px 14px; font-family:'Tajawal',sans-serif;
  font-size:13px; font-weight:600; color:var(--muted); cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
}
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:white; }

/* MAIN CONTENT */
.main { flex:1; overflow-y:auto; padding:0 0 80px; scrollbar-width:none; }
.main::-webkit-scrollbar { display:none; }

/* HERO SEARCH SECTION */
.hero { padding:20px; }
.hero-title { font-size:26px; font-weight:900; line-height:1.2; margin-bottom:6px; }
.hero-title span { color:var(--accent); }
.hero-sub { font-size:14px; color:var(--muted); margin-bottom:20px; }

/* SEARCH BTN */
.search-btn {
  width:100%; background:var(--accent); border:none; border-radius:14px;
  padding:16px; font-family:'Tajawal',sans-serif; font-size:17px; font-weight:800;
  color:white; cursor:pointer; transition:all 0.3s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.search-btn:active { transform:scale(0.98); }
.search-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* CITY INPUT */
.city-wrap { margin-bottom:14px; }
.city-label { font-size:12px; font-weight:700; color:var(--accent); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.city-input {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  border-radius:12px; padding:12px 16px; color:var(--text);
  font-family:'Tajawal',sans-serif; font-size:15px; outline:none; transition:all 0.2s;
}
.city-input:focus { border-color:var(--accent); }

/* LOADING */
.loading { display:none; padding:40px 20px; text-align:center; }
.loading.show { display:block; }
.spinner { width:40px; height:40px; border:3px solid var(--bg3); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 14px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { color:var(--muted); font-size:14px; }

/* RESULTS */
.results-header { padding:16px 20px 8px; display:flex; align-items:center; justify-content:space-between; }
.results-title { font-size:16px; font-weight:800; }
.results-count { font-size:12px; color:var(--muted); background:var(--bg3); padding:4px 10px; border-radius:20px; }

/* CARD */
.restaurant-card {
  margin:0 16px 12px; background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden; cursor:pointer;
  transition:all 0.2s; animation:fadeUp 0.4s ease forwards; opacity:0;
}
.restaurant-card:active { transform:scale(0.98); }
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } from { opacity:0; transform:translateY(16px); } }

.card-map { height:140px; background:var(--bg3); position:relative; overflow:hidden; }
.card-map-img { width:100%; height:100%; object-fit:cover; }
.card-map-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:40px; background: linear-gradient(135deg, #1a1a2e, #16213e); }

.card-body { padding:14px; }
.card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px; }
.card-name { font-size:17px; font-weight:800; line-height:1.2; flex:1; margin-left:8px; }
.card-category { font-size:11px; color:var(--muted); margin-top:2px; }

.open-badge {
  flex-shrink:0; font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px;
}
.open-badge.open { background:rgba(74,222,128,0.15); color:var(--green); }
.open-badge.closed { background:rgba(248,113,113,0.15); color:var(--red); }
.open-badge.unknown { background:var(--bg3); color:var(--muted); }

.card-info { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.info-item { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); }
.info-item .icon { font-size:14px; }

.card-actions { display:flex; gap:8px; }
.action-btn {
  flex:1; padding:10px 8px; border-radius:10px; border:none;
  font-family:'Tajawal',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:5px;
}
.action-btn:active { transform:scale(0.96); }
.btn-directions { background:var(--accent); color:white; }
.btn-call { background:var(--bg3); color:var(--text); border:1px solid var(--border); }
.btn-map { background:var(--bg3); color:var(--text); border:1px solid var(--border); }

/* MAP MODAL */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);
  z-index:200; align-items:flex-end;
}
.modal-overlay.show { display:flex; }
.modal {
  width:100%; max-width:480px; margin:0 auto;
  background:var(--bg2); border-radius:24px 24px 0 0;
  max-height:90vh; overflow-y:auto;
  animation:slideUp 0.3s ease;
}
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 0; }
.modal-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:18px; font-weight:800; }
.modal-close { background:var(--bg3); border:none; color:var(--text); width:32px; height:32px; border-radius:50%; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

#modalMap { height:250px; }

.modal-body { padding:20px; }
.detail-section { margin-bottom:20px; }
.detail-title { font-size:12px; font-weight:700; color:var(--accent); letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
.detail-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.detail-row:last-child { border-bottom:none; }
.detail-icon { font-size:18px; width:28px; text-align:center; }
.detail-text { flex:1; font-size:14px; }
.detail-text small { color:var(--muted); font-size:12px; display:block; }

.hours-grid { display:flex; flex-direction:column; gap:4px; }
.hour-row { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
.hour-day { color:var(--muted); }
.hour-time { font-weight:600; }
.hour-row.today .hour-day { color:var(--accent); font-weight:700; }
.hour-row.today .hour-time { color:var(--green); }

.modal-actions { display:flex; gap:10px; padding:0 20px 30px; }
.modal-action-btn {
  flex:1; padding:14px; border-radius:12px; border:none;
  font-family:'Tajawal',sans-serif; font-size:15px; font-weight:800;
  cursor:pointer; transition:all 0.2s;
}
.modal-action-btn:active { transform:scale(0.97); }

/* BOTTOM NAV */
.bottom-nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  background:rgba(10,10,10,0.95); backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex; padding:8px 0 16px;
}
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; color:var(--muted); cursor:pointer; padding:6px; transition:all 0.2s; font-family:'Tajawal',sans-serif; }
.nav-btn.active { color:var(--accent); }
.nav-icon { font-size:22px; }
.nav-label { font-size:10px; font-weight:700; }

/* ERROR */
.error-box { margin:0 20px 16px; background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); border-radius:12px; padding:14px 16px; color:var(--red); font-size:14px; display:none; }
.error-box.show { display:block; }

/* EMPTY STATE */
.empty-state { padding:60px 20px; text-align:center; display:none; }
.empty-state.show { display:block; }
.empty-icon { font-size:60px; margin-bottom:16px; }
.empty-title { font-size:18px; font-weight:800; margin-bottom:8px; }
.empty-sub { font-size:14px; color:var(--muted); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="logo">م<span>طعم</span></div>
      <div class="location-pill" onclick="detectLocation()">
        <div class="dot"></div>
        <span id="locationText">حدد موقعك</span>
      </div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter(this,'')">الكل 🍽️</button>
    <button class="filter-btn" onclick="setFilter(this,'restaurant')">مطاعم</button>
    <button class="filter-btn" onclick="setFilter(this,'fast_food')">فاست فود 🍔</button>
    <button class="filter-btn" onclick="setFilter(this,'cafe')">كافيه ☕</button>
    <button class="filter-btn" onclick="setFilter(this,'pizza')">بيتزا 🍕</button>
    <button class="filter-btn" onclick="setFilter(this,'burger')">برغر 🍔</button>
    <button class="filter-btn" onclick="setFilter(this,'sushi')">سوشي 🍣</button>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainContent">

    <!-- HERO -->
    <div class="hero" id="heroSection">
      <div class="hero-title">اكتشف أفضل<br><span>المطاعم</span> قريبك</div>
      <div class="hero-sub">معلومات حقيقية • اتجاهات • أوقات الدوام</div>

      <div class="city-wrap">
        <div class="city-label">📍 المدينة أو المنطقة</div>
        <input type="text" class="city-input" id="cityInput" placeholder="مثال: الرياض، دبي، عمّان..." />
      </div>

      <button class="search-btn" id="searchBtn" onclick="searchNearby()">
        <span>🔍</span> ابحث عن المطاعم
      </button>
    </div>

    <!-- ERROR -->
    <div class="error-box" id="errorBox"></div>

    <!-- LOADING -->
    <div class="loading" id="loadingDiv">
      <div class="spinner"></div>
      <div class="loading-text">جاري البحث عن المطاعم...</div>
    </div>

    <!-- RESULTS -->
    <div id="resultsSection" style="display:none">
      <div class="results-header">
        <div class="results-title">🏆 نتائج البحث</div>
        <div class="results-count" id="resultsCount">0 مطعم</div>
      </div>
      <div id="restaurantsList"></div>
    </div>

    <!-- EMPTY -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🍽️</div>
      <div class="empty-title">ما لقينا مطاعم</div>
      <div class="empty-sub">جرب مدينة ثانية أو فلتر مختلف</div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="goHome()">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">الرئيسية</span>
    </button>
    <button class="nav-btn" onclick="searchNearbyGPS()">
      <span class="nav-icon">📍</span>
      <span class="nav-label">قريب مني</span>
    </button>
    <button class="nav-btn" onclick="showMap()">
      <span class="nav-icon">🗺️</span>
      <span class="nav-label">الخريطة</span>
    </button>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">تفاصيل المطعم</div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div id="modalMap"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
let currentFilter = '';
let allResults = [];
let userLat = null, userLon = null;
let modalMapInstance = null;

// ===== LOCATION =====
function detectLocation() {
  document.getElementById('locationText').textContent = 'جاري التحديد...';
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    // Reverse geocode
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLon}&format=json`)
      .then(r => r.json()).then(d => {
        const city = d.address.city || d.address.town || d.address.village || 'موقعك';
        document.getElementById('locationText').textContent = city;
        document.getElementById('cityInput').value = city;
      });
  }, err => {
    document.getElementById('locationText').textContent = 'تعذر التحديد';
  });
}

// ===== FILTER =====
function setFilter(el, type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentFilter = type;
  if (allResults.length > 0) displayResults(allResults);
}

// ===== SEARCH =====
async function searchNearby() {
  const city = document.getElementById('cityInput').value.trim();
  if (!city) { showError('أدخل اسم المدينة'); return; }

  showLoading(true);
  hideError();

  try {
    // Geocode city
    const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1`);
    const geoData = await geoRes.json();
    if (!geoData.length) throw new Error('ما لقينا هاي المدينة، جرب اسم ثاني');

    const lat = parseFloat(geoData[0].lat);
    const lon = parseFloat(geoData[0].lon);
    userLat = lat; userLon = lon;

    await fetchRestaurants(lat, lon);
  } catch(e) {
    showLoading(false);
    showError(e.message);
  }
}

async function searchNearbyGPS() {
  if (!navigator.geolocation) { showError('المتصفح ما يدعم GPS'); return; }
  showLoading(true);
  hideError();
  navigator.geolocation.getCurrentPosition(async pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    await fetchRestaurants(userLat, userLon);
  }, () => {
    showLoading(false);
    showError('تعذر تحديد موقعك، أدخل المدينة يدوياً');
  });
}

async function fetchRestaurants(lat, lon) {
  const radius = 2000; // 2km
  const query = `
    [out:json][timeout:25];
    (
      node["amenity"="restaurant"](around:${radius},${lat},${lon});
      node["amenity"="fast_food"](around:${radius},${lat},${lon});
      node["amenity"="cafe"](around:${radius},${lat},${lon});
    );
    out body;
  `;

  const res = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    body: query
  });
  const data = await res.json();

  allResults = data.elements.filter(e => e.tags && e.tags.name);
  showLoading(false);

  if (allResults.length === 0) {
    document.getElementById('emptyState').classList.add('show');
  } else {
    displayResults(allResults);
  }
}

// ===== DISPLAY =====
function displayResults(items) {
  document.getElementById('heroSection').style.display = 'none';
  document.getElementById('resultsSection').style.display = 'block';
  document.getElementById('emptyState').classList.remove('show');

  let filtered = items;
  if (currentFilter) {
    filtered = items.filter(i => {
      const amenity = i.tags.amenity || '';
      const cuisine = i.tags.cuisine || '';
      return amenity === currentFilter || cuisine.includes(currentFilter);
    });
  }

  document.getElementById('resultsCount').textContent = `${filtered.length} مطعم`;

  const list = document.getElementById('restaurantsList');
  list.innerHTML = '';

  filtered.slice(0, 30).forEach((r, i) => {
    const card = buildCard(r, i);
    list.appendChild(card);
  });
}

function buildCard(r, i) {
  const tags = r.tags || {};
  const name = tags.name || tags['name:ar'] || 'مطعم';
  const cuisine = getCuisineAr(tags.cuisine || tags.amenity || '');
  const phone = tags.phone || tags['contact:phone'] || null;
  const hours = tags.opening_hours || null;
  const isOpen = checkOpen(hours);
  const dist = userLat ? getDistance(userLat, userLon, r.lat, r.lon) : null;

  const card = document.createElement('div');
  card.className = 'restaurant-card';
  card.style.animationDelay = `${i * 0.05}s`;

  const emoji = getEmoji(tags);

  card.innerHTML = `
    <div class="card-map-placeholder">${emoji}</div>
    <div class="card-body">
      <div class="card-top">
        <div>
          <div class="card-name">${name}</div>
          <div class="card-category">${cuisine}</div>
        </div>
        <div class="open-badge ${isOpen.cls}">${isOpen.text}</div>
      </div>
      <div class="card-info">
        ${dist ? `<div class="info-item"><span class="icon">📍</span>${dist} كم</div>` : ''}
        ${phone ? `<div class="info-item"><span class="icon">📞</span>${phone}</div>` : ''}
        ${hours ? `<div class="info-item"><span class="icon">🕐</span>${hours.split(';')[0]}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="action-btn btn-directions" onclick="openDirections(${r.lat},${r.lon})">🧭 اتجاهات</button>
        ${phone ? `<button class="action-btn btn-call" onclick="callPhone('${phone}')">📞 اتصال</button>` : ''}
        <button class="action-btn btn-map" onclick="openDetail(${JSON.stringify(r).replace(/"/g,'&quot;')})">📋 تفاصيل</button>
      </div>
    </div>
  `;

  return card;
}

// ===== MODAL DETAIL =====
function openDetail(r) {
  const tags = r.tags || {};
  const name = tags.name || 'مطعم';
  const phone = tags.phone || tags['contact:phone'] || null;
  const hours = tags.opening_hours || null;
  const website = tags.website || tags['contact:website'] || null;
  const cuisine = getCuisineAr(tags.cuisine || tags.amenity || '');
  const address = [tags['addr:street'], tags['addr:housenumber'], tags['addr:city']].filter(Boolean).join('، ');

  document.getElementById('modalTitle').textContent = name;

  // Build modal map
  document.getElementById('modalMap').innerHTML = '';
  setTimeout(() => {
    if (modalMapInstance) { modalMapInstance.remove(); modalMapInstance = null; }
    modalMapInstance = L.map('modalMap', { zoomControl:false }).setView([r.lat, r.lon], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '' }).addTo(modalMapInstance);
    L.marker([r.lat, r.lon]).addTo(modalMapInstance).bindPopup(name).openPopup();
  }, 100);

  // Build body
  let body = '';

  // Info
  body += `<div class="detail-section"><div class="detail-title">معلومات المطعم</div>`;
  body += `<div class="detail-row"><span class="detail-icon">🍽️</span><div class="detail-text">${cuisine}<small>نوع المطبخ</small></div></div>`;
  if (address) body += `<div class="detail-row"><span class="detail-icon">📍</span><div class="detail-text">${address}<small>العنوان</small></div></div>`;
  if (phone) body += `<div class="detail-row"><span class="detail-icon">📞</span><div class="detail-text">${phone}<small>رقم الهاتف</small></div></div>`;
  if (website) body += `<div class="detail-row"><span class="detail-icon">🌐</span><div class="detail-text"><a href="${website}" target="_blank" style="color:var(--accent)">${website}</a><small>الموقع الإلكتروني</small></div></div>`;
  body += `</div>`;

  // Hours
  if (hours) {
    body += `<div class="detail-section"><div class="detail-title">أوقات الدوام</div>`;
    body += `<div class="detail-row"><span class="detail-icon">🕐</span><div class="detail-text">${hours}</div></div>`;
    body += `</div>`;
  }

  document.getElementById('modalBody').innerHTML = body;

  // Actions
  document.getElementById('modalActions').innerHTML = `
    <button class="modal-action-btn" style="background:var(--accent);color:white" onclick="openDirections(${r.lat},${r.lon})">🧭 احصل على الاتجاهات</button>
    ${phone ? `<button class="modal-action-btn" style="background:var(--bg3);border:1px solid var(--border)" onclick="callPhone('${phone}')">📞 اتصال</button>` : ''}
  `;

  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ===== ACTIONS =====
function openDirections(lat, lon) {
  const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
  window.open(url, '_blank');
}

function callPhone(phone) {
  window.location.href = `tel:${phone.replace(/\s/g,'')}`;
}

function showMap() {
  if (!userLat) { showError('ابحث عن مطاعم أول'); return; }
  const url = `https://www.openstreetmap.org/?mlat=${userLat}&mlon=${userLon}#map=15/${userLat}/${userLon}`;
  window.open(url, '_blank');
}

function goHome() {
  document.getElementById('heroSection').style.display = 'block';
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('emptyState').classList.remove('show');
}

// ===== HELPERS =====
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
}

function checkOpen(hours) {
  if (!hours) return { cls:'unknown', text:'غير محدد' };
  if (hours === '24/7') return { cls:'open', text:'مفتوح 24/7' };
  return { cls:'unknown', text:'تحقق من الأوقات' };
}

function getCuisineAr(cuisine) {
  const map = { restaurant:'مطعم', fast_food:'فاست فود', cafe:'كافيه', pizza:'بيتزا', burger:'برغر', sushi:'سوشي', arabic:'عربي', lebanese:'لبناني', turkish:'تركي', indian:'هندي', italian:'إيطالي', chinese:'صيني', mexican:'مكسيكي', seafood:'مأكولات بحرية' };
  const parts = cuisine.split(';');
  return map[parts[0].trim()] || cuisine || 'مطعم';
}

function getEmoji(tags) {
  const c = tags.cuisine || '';
  const a = tags.amenity || '';
  if (c.includes('sushi') || c.includes('japanese')) return '🍣';
  if (c.includes('pizza')) return '🍕';
  if (c.includes('burger')) return '🍔';
  if (c.includes('arabic') || c.includes('lebanese')) return '🥙';
  if (c.includes('indian')) return '🍛';
  if (c.includes('chinese')) return '🥢';
  if (c.includes('seafood')) return '🦞';
  if (a === 'cafe') return '☕';
  if (a === 'fast_food') return '🍟';
  return '🍽️';
}

function showLoading(show) {
  document.getElementById('loadingDiv').classList.toggle('show', show);
  document.getElementById('searchBtn').disabled = show;
}

function showError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = '⚠️ ' + msg;
  b.classList.add('show');
}
function hideError() { document.getElementById('errorBox').classList.remove('show'); }

// Enter key
document.getElementById('cityInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchNearby();
});
</script>
