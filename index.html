<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أفضل المطاعم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4A853;
    --gold-light: #F0C97A;
    --dark: #0D0A06;
    --dark2: #1A1408;
    --dark3: #241C0C;
    --cream: #F5EDD8;
    --cream2: #EDE0C4;
    --red: #C0392B;
    --green: #27AE60;
    --text-muted: #8A7A5A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(212,168,83,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(192,57,43,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    padding: 50px 20px 40px;
    position: relative;
  }

  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    padding: 5px 16px;
    border-radius: 20px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--cream) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 1rem;
    font-weight: 400;
  }

  /* Search Section */
  .search-section {
    background: var(--dark2);
    border: 1px solid rgba(212,168,83,0.2);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  @media(max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
  }

  .field-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  input, select, textarea {
    width: 100%;
    background: var(--dark3);
    border: 1px solid rgba(212,168,83,0.15);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--cream);
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212,168,83,0.1);
  }

  select option { background: var(--dark3); color: var(--cream); }

  textarea { resize: vertical; min-height: 70px; }

  .api-field {
    margin-bottom: 14px;
  }

  .api-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 5px;
  }

  .api-hint a {
    color: var(--gold);
    text-decoration: none;
  }

  .search-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Tajawal', sans-serif;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }

  .search-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(212,168,83,0.4);
  }

  .search-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 50px 20px;
  }

  .loading.active { display: block; }

  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(212,168,83,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: var(--gold);
    font-size: 1rem;
    font-weight: 500;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* Results */
  .results { display: none; }
  .results.active { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(212,168,83,0.15);
  }

  .results-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    flex: 1;
  }

  .results-count {
    background: rgba(212,168,83,0.15);
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* Restaurant Card */
  .restaurant-card {
    background: var(--dark2);
    border: 1px solid rgba(212,168,83,0.12);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
    transition: all 0.3s;
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
    transform: translateY(20px);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .restaurant-card:hover {
    border-color: rgba(212,168,83,0.35);
    box-shadow: 0 4px 20px rgba(212,168,83,0.1);
    transform: translateY(-2px);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
  }

  .rank-badge {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
    font-size: 16px;
    font-weight: 900;
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-info { flex: 1; }

  .restaurant-name {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--cream);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .restaurant-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .tag-cuisine {
    background: rgba(212,168,83,0.12);
    color: var(--gold);
    border: 1px solid rgba(212,168,83,0.2);
  }

  .tag-rating {
    background: rgba(39,174,96,0.12);
    color: #2ECC71;
    border: 1px solid rgba(39,174,96,0.2);
  }

  .tag-price {
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .card-description {
    font-size: 14px;
    color: var(--cream2);
    line-height: 1.7;
    margin-bottom: 14px;
    opacity: 0.85;
  }

  .highlights {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .highlight-item {
    background: var(--dark3);
    border: 1px solid rgba(212,168,83,0.1);
    color: var(--text-muted);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Error */
  .error-box {
    display: none;
    background: rgba(192,57,43,0.1);
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    color: #E74C3C;
    font-size: 14px;
    margin-bottom: 16px;
  }

  .error-box.active { display: block; }

  /* Divider */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: rgba(212,168,83,0.15);
  }

  .divider-text {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-badge">🍽️ مدعوم بالذكاء الاصطناعي</div>
    <h1>أفضل المطاعم</h1>
    <p class="subtitle">اكتشف أرقى المطاعم في مدينتك</p>
  </header>

  <div class="search-section">
    
    <div class="api-field">
      <div class="field-label">🔑 مفتاح OpenRouter API</div>
      <input type="password" id="apiKey" placeholder="sk-or-v1-..." />
      <div class="api-hint">احصل على مفتاحك مجاناً من <a href="https://openrouter.ai/settings/keys" target="_blank">openrouter.ai</a></div>
    </div>

    <div class="section-divider">
      <div class="divider-line"></div>
      <div class="divider-text">تفاصيل البحث</div>
      <div class="divider-line"></div>
    </div>

    <div class="form-row">
      <div>
        <div class="field-label">📍 المدينة</div>
        <input type="text" id="city" placeholder="مثال: الرياض، دبي، بيروت..." />
      </div>
      <div>
        <div class="field-label">🍜 نوع المطبخ</div>
        <select id="cuisine">
          <option value="أي نوع">أي نوع 🌍</option>
          <option value="عربي">عربي 🥙</option>
          <option value="إيطالي">إيطالي 🍕</option>
          <option value="ياباني">ياباني 🍣</option>
          <option value="هندي">هندي 🍛</option>
          <option value="مشاوي">مشاوي 🔥</option>
          <option value="مأكولات بحرية">مأكولات بحرية 🦞</option>
          <option value="برغر">برغر 🍔</option>
          <option value="مكسيكي">مكسيكي 🌮</option>
          <option value="فرنسي">فرنسي 🥐</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div>
        <div class="field-label">💰 الميزانية</div>
        <select id="budget">
          <option value="أي ميزانية">أي ميزانية</option>
          <option value="اقتصادي (أقل من 50 ريال/درهم)">اقتصادي 💚</option>
          <option value="متوسط (50-150 ريال/درهم)">متوسط 💛</option>
          <option value="فاخر (150+ ريال/درهم)">فاخر 🏆</option>
        </select>
      </div>
      <div>
        <div class="field-label">🎯 مناسبة</div>
        <select id="occasion">
          <option value="أي مناسبة">أي مناسبة</option>
          <option value="عشاء رومانسي">عشاء رومانسي 💑</option>
          <option value="عائلي">عائلي 👨‍👩‍👧‍👦</option>
          <option value="اجتماع عمل">اجتماع عمل 💼</option>
          <option value="مع الأصدقاء">مع الأصدقاء 🎉</option>
        </select>
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <div class="field-label">✍️ تفاصيل إضافية (اختياري)</div>
      <textarea id="extra" placeholder="مثال: أريد مطعماً على البحر، أو يوجد موسيقى حية، أو تجربة خاصة..."></textarea>
    </div>

    <div class="error-box" id="errorBox">⚠️ <span id="errorMsg"></span></div>

    <button class="search-btn" id="searchBtn" onclick="searchRestaurants()">
      🔍 ابحث عن أفضل المطاعم
    </button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">جاري البحث عن أفضل المطاعم...</div>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <div class="results-title">🏆 أفضل المطاعم الموصى بها</div>
      <div class="results-count" id="resultsCount">0 مطعم</div>
    </div>
    <div id="restaurantsList"></div>
  </div>

</div>

<script>
async function searchRestaurants() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const city = document.getElementById('city').value.trim();
  const cuisine = document.getElementById('cuisine').value;
  const budget = document.getElementById('budget').value;
  const occasion = document.getElementById('occasion').value;
  const extra = document.getElementById('extra').value.trim();

  // Validation
  const errorBox = document.getElementById('errorBox');
  const errorMsg = document.getElementById('errorMsg');
  errorBox.classList.remove('active');

  if (!apiKey) {
    errorMsg.textContent = 'الرجاء إدخال مفتاح OpenRouter API';
    errorBox.classList.add('active');
    return;
  }
  if (!city) {
    errorMsg.textContent = 'الرجاء إدخال اسم المدينة';
    errorBox.classList.add('active');
    return;
  }

  // Show loading
  document.getElementById('loading').classList.add('active');
  document.getElementById('results').classList.remove('active');
  document.getElementById('searchBtn').disabled = true;

  const prompt = `أنت خبير في المطاعم والطعام. قدم توصيات بـ 5 من أفضل المطاعم في ${city} للمعايير التالية:
- نوع المطبخ: ${cuisine}
- الميزانية: ${budget}
- المناسبة: ${occasion}
${extra ? `- تفاصيل إضافية: ${extra}` : ''}

أجب بتنسيق JSON فقط، بدون أي نص قبله أو بعده، بالشكل التالي:
{
  "restaurants": [
    {
      "rank": 1,
      "name": "اسم المطعم",
      "cuisine": "نوع المطبخ",
      "rating": "4.8/5",
      "price_range": "$$$ أو $$ أو $",
      "description": "وصف مختصر ومشوق للمطعم (2-3 جمل)",
      "highlights": ["ميزة 1", "ميزة 2", "ميزة 3"],
      "best_dish": "أشهر طبق"
    }
  ]
}`;

  try {
    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
        'HTTP-Referer': 'https://restaurant-finder.app',
        'X-Title': 'Restaurant Finder'
      },
      body: JSON.stringify({
        model: 'google/gemini-2.0-flash-001',
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 2000
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || 'خطأ في الاتصال بـ API');
    }

    const text = data.choices[0].message.content;
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    displayResults(parsed.restaurants);

  } catch (err) {
    errorMsg.textContent = 'حدث خطأ: ' + err.message;
    errorBox.classList.add('active');
  } finally {
    document.getElementById('loading').classList.remove('active');
    document.getElementById('searchBtn').disabled = false;
  }
}

function displayResults(restaurants) {
  const list = document.getElementById('restaurantsList');
  const count = document.getElementById('resultsCount');
  
  list.innerHTML = '';
  count.textContent = `${restaurants.length} مطعم`;

  restaurants.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'restaurant-card';
    card.style.animationDelay = `${i * 0.1}s`;

    const highlights = (r.highlights || []).map(h => 
      `<div class="highlight-item">✦ ${h}</div>`
    ).join('');

    card.innerHTML = `
      <div class="card-header">
        <div class="rank-badge">${r.rank}</div>
        <div class="card-info">
          <div class="restaurant-name">${r.name}</div>
          <div class="restaurant-meta">
            <span class="tag tag-cuisine">🍽️ ${r.cuisine}</span>
            <span class="tag tag-rating">⭐ ${r.rating}</span>
            <span class="tag tag-price">${r.price_range}</span>
          </div>
        </div>
      </div>
      <div class="card-description">${r.description}</div>
      ${r.best_dish ? `<div style="margin-bottom:12px; font-size:13px; color:var(--gold)">🏆 أشهر طبق: <span style="color:var(--cream2)">${r.best_dish}</span></div>` : ''}
      <div class="highlights">${highlights}</div>
    `;

    list.appendChild(card);
  });

  document.getElementById('results').classList.add('active');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Allow Enter in city field
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('city').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchRestaurants();
  });
});
</script>
</body>
</html>
